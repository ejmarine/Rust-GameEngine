name: release-artifact

on:
  push:
  workflow_dispatch:
    

jobs:
  build-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > install.sh && chmod 777 install.sh && ./install.sh -y
      - run: cargo build

      - uses: actions/upload-artifact@v7
        with:
          name: gameengine.exe
          path: /home/runner/work/Rust-GameEngine/Rust-GameEngine/target/debug/game.exe
      
      - name: Upload binaries to release
        if: startsWith(github.ref, 'v')
        uses: svenstaro/upload-release-action@v2
        with:
            repo_token: ${{ secrets.GITHUB_TOKEN }}
            file: target/debug/game.exe
            asset_name: game.exe
            tag: ${{ github.ref }}
            overwrite: true
            body: "This is my release text"